<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dial Tone Detective</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <a class="back" href="../../index.html">← Retro Lab</a>
      <h1>Dial Tone Detective</h1>
      <p>Audio puzzle · decode mystery keypad tones before time runs out.</p>
    </header>

    <section class="hud" aria-live="polite">
      <div><span class="label">Time</span><span id="time">45</span></div>
      <div><span class="label">Score</span><span id="score">0</span></div>
      <div><span class="label">Streak</span><span id="streak">0</span></div>
      <div><span class="label">Lives</span><span id="lives">3</span></div>
    </section>

    <section class="controls">
      <button id="start">Start Shift</button>
      <button id="replay" disabled>Replay Tone</button>
      <div id="prompt">Press <strong>Start Shift</strong> to open the telecom line.</div>
    </section>

    <section class="pad" id="keypad" aria-label="Telephone keypad"></section>

    <section class="log">
      <h2>Last Calls</h2>
      <ul id="history"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
