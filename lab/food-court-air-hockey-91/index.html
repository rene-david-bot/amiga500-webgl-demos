<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Court Air Hockey '91</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Food Court Air Hockey '91</h1>
      <p>After-hours at the arcade mall, one puck, one table, one rival kiosk bot. First to 7 wins.</p>
    </header>

    <section class="hud" aria-live="polite">
      <div><span class="label">You</span><strong id="playerScore">0</strong></div>
      <div><span class="label">CPU</span><strong id="cpuScore">0</strong></div>
      <div><span class="label">Time</span><strong id="timeLeft">75.0s</strong></div>
      <div><span class="label">Best</span><strong id="bestWins">0</strong></div>
    </section>

    <section class="table-wrap">
      <canvas id="table" width="900" height="540" aria-label="Air hockey table"></canvas>
      <p id="status" class="status">Move your mouse (or finger) in the lower half. Press Start Match.</p>
    </section>

    <section class="controls">
      <button id="startBtn" class="primary">Start Match</button>
      <button id="pauseBtn" disabled>Pause</button>
      <button id="resetBtn">Reset</button>
    </section>

    <p class="tip">Tip: bank shots off the side rails can beat the bot keeper.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
