<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trackball Maze Courier — deliver retro data disks through procedurally generated mazes." />
  <title>Trackball Maze Courier</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <a class="back" href="../../index.html">← Retro Lab</a>
      <h1>Trackball Maze Courier</h1>
      <p>Arcade puzzle · Deliver every floppy before the shift timer hits zero.</p>
    </header>

    <section class="hud" aria-live="polite">
      <div><span>Level</span><strong id="level">1</strong></div>
      <div><span>Score</span><strong id="score">0</strong></div>
      <div><span>Time</span><strong id="time">0.0s</strong></div>
      <div><span>Disks</span><strong id="disks">0/0</strong></div>
      <div><span>Best</span><strong id="best">0</strong></div>
    </section>

    <section class="arena-wrap">
      <div id="maze" class="maze" role="application" aria-label="Maze playfield"></div>
      <div class="legend">
        <span><i class="chip player-chip"></i>You</span>
        <span><i class="chip disk-chip"></i>Disk</span>
        <span><i class="chip exit-chip"></i>Exit</span>
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" class="primary">Start Shift</button>
      <button id="restartBtn" class="ghost">Restart Run</button>
      <p>Use arrow keys (or WASD) to move one tile at a time.</p>
    </section>

    <section class="status" id="status">Press <b>Start Shift</b> to generate your first route.</section>
  </main>

  <script src="script.js"></script>
</body>
</html>
