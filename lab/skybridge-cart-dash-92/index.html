<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skybridge Cart Dash '92</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Skybridge Cart Dash '92</h1>
      <p>Floor the electric service cart, dodge terminal clutter, and deliver boarding passes before your battery dies.</p>
    </header>

    <section class="hud" aria-live="polite">
      <div><span class="label">Score</span><strong id="score">0</strong></div>
      <div><span class="label">Time</span><strong id="time">75.0s</strong></div>
      <div><span class="label">Battery</span><strong id="fuel">100%</strong></div>
      <div><span class="label">Best</span><strong id="best">0</strong></div>
    </section>

    <section class="controls">
      <button id="startBtn" class="primary">Start Shift</button>
      <button id="restartBtn">Restart</button>
      <p id="status">Use ← / → (or A / D). Grab yellow PASS tiles, avoid red baggage carts.</p>
    </section>

    <section class="stage-wrap">
      <canvas id="game" width="900" height="560" aria-label="Skybridge cart racing game"></canvas>
      <div class="scanlines" aria-hidden="true"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
